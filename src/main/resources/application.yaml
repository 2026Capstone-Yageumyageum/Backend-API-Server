spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: your_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            # GCP 콘솔에서 발급받은 값 입력
            client-id: "enter_your_client_id"
            client-secret: "enter_your_client_secret"
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code

jwt:
  secret: ${JWT_SECRET_KEY:default_secret_key_over_32_characters_long}
  access-expiration: 3600000        # 1시간
  refresh-expiration: 1209600000   # 14일